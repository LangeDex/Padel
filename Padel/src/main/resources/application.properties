spring.application.name=Padel

server.port=8584
currency.service.url=http://localhost:8587
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/wigell-realm

spring.datasource.url=jdbc:mysql://localhost:3306/wigell_padel_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
