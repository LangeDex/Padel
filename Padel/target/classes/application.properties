spring.application.name=Padel

server.port=8584

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/wigell_padel_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Dex03
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Actuator
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true

info.app.name=Wigell Padel
info.app.version=1.0.0

# Logging till fil (VG)
logging.file.name=logs/wigell-padel.log
logging.level.com.Skoglund.Padel=INFO
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
